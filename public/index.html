<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MinIO Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0d;
    --bg2: #111318;
    --bg3: #181c22;
    --border: #232830;
    --accent: #00d4aa;
    --accent2: #00ffcc;
    --accent-dim: rgba(0,212,170,0.1);
    --text: #c8d0db;
    --text2: #6b7585;
    --text3: #363d4a;
    --yellow: #f0c040;
    --red: #ff5566;
    --blue: #4da8ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo em { color: var(--text3); font-style: normal; }

  .conn-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    background: var(--bg3);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .dot.ok { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.err { background: var(--red); }

  header .spacer { flex: 1; }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    transition: all 0.15s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* APP */
  .app { display: flex; flex: 1; height: calc(100vh - 56px); overflow: hidden; }

  /* LOGIN SCREEN */
  .login-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  .login-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,170,0.04) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    width: 420px;
    position: relative;
    z-index: 1;
  }

  .login-card h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }

  .login-card p {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }

  .field label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    letter-spacing: 0.05em;
  }

  .field input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }

  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text3); }

  .btn-connect {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-connect:hover { background: var(--accent2); }
  .btn-connect:disabled { opacity: 0.5; cursor: not-allowed; }

  .err-msg {
    background: rgba(255,85,102,0.08);
    border: 1px solid rgba(255,85,102,0.2);
    color: var(--red);
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    margin-top: 12px;
  }

  /* SIDEBAR */
  aside {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 14px 16px 8px;
  }

  .bucket-list { flex: 1; overflow-y: auto; padding: 4px 8px 8px; }

  .bucket-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.1s;
    border: 1px solid transparent;
  }

  .bucket-item:hover { background: var(--bg3); }
  .bucket-item.active { background: var(--accent-dim); border-color: rgba(0,212,170,0.2); }

  .bucket-item .bname {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .bucket-item.active .bname { color: var(--accent); }

  /* MAIN */
  main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }

  .breadcrumb {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .crumb { cursor: pointer; color: var(--text2); }
  .crumb:hover { color: var(--accent); }
  .crumb.last { color: var(--text); cursor: default; }
  .crumb-sep { color: var(--text3); margin: 0 4px; }

  .search-box {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-box input {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 10px 7px 32px;
    border-radius: 6px;
    outline: none;
    width: 220px;
    transition: border-color 0.15s, width 0.2s;
  }

  .search-box input:focus { border-color: var(--accent); width: 280px; }
  .search-box input::placeholder { color: var(--text3); }
  .search-icon { position: absolute; left: 10px; color: var(--text3); font-size: 13px; pointer-events: none; }

  .btn-icon {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 32px; height: 32px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.12s;
  }
  .btn-icon:hover { border-color: var(--accent); color: var(--accent); }

  /* SELECTION BAR */
  .sel-bar {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 16px;
    background: rgba(0,212,170,0.05);
    border-bottom: 1px solid rgba(0,212,170,0.15);
    font-size: 13px;
  }
  .sel-bar.on { display: flex; }
  .sel-count { font-family: 'JetBrains Mono', monospace; color: var(--accent); font-weight: 600; }
  .sel-bar .sp { flex: 1; }

  .btn-sm {
    padding: 6px 12px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.12s;
  }

  .btn-dl-all {
    background: var(--accent);
    color: #000;
  }
  .btn-dl-all:hover { background: var(--accent2); }

  .btn-desel {
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border) !important;
    border: none;
  }
  .btn-desel:hover { color: var(--red); border-color: var(--red) !important; }

  /* FILE AREA */
  .file-area { flex: 1; overflow-y: auto; }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    text-align: left;
    padding: 10px 14px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    user-select: none;
  }

  tbody tr {
    border-bottom: 1px solid rgba(35,40,48,0.8);
    transition: background 0.08s;
    cursor: pointer;
  }

  tbody tr:hover { background: var(--bg2); }
  tbody tr.sel { background: rgba(0,212,170,0.04); }

  td { padding: 9px 14px; vertical-align: middle; }
  .td-chk { width: 40px; }

  input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

  .fname {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .fname.folder { color: var(--blue); }
  .fname.folder:hover { color: var(--accent); }

  .fsize, .fdate {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }

  .fdate { color: var(--text3); }

  .td-act { width: 50px; text-align: right; }

  .btn-dl1 {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
    font-family: 'JetBrains Mono', monospace;
  }
  .btn-dl1:hover { border-color: var(--accent); color: var(--accent); }

  /* STATES */
  .state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 14px;
    color: var(--text3);
    font-size: 13px;
    padding: 40px;
    text-align: center;
  }

  .state .ico { font-size: 36px; opacity: 0.4; }
  .state .emsg { color: var(--red); font-family: 'JetBrains Mono', monospace; font-size: 12px; max-width: 400px; line-height: 1.6; }

  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* STATUS */
  .statusbar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 5px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }
  .statusbar .sp { flex: 1; }

  mark { background: rgba(0,212,170,0.2); color: var(--accent); border-radius: 2px; padding: 0 1px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">MinIO<em>/</em>Browser</div>
  <div class="conn-badge">
    <div class="dot" id="dot"></div>
    <span id="connLabel">niepołączony</span>
  </div>
  <div class="spacer"></div>
  <button class="btn-logout" id="btnLogout" style="display:none" onclick="logout()">Wyloguj</button>
</header>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>Połącz z MinIO</h1>
    <p>Podaj dane dostępowe do swojego serwera MinIO.</p>
    <div class="field">
      <label>Endpoint</label>
      <input id="endpoint" type="text" value="https://minio.pse.pl" placeholder="https://minio.pse.pl">
    </div>
    <div class="field">
      <label>Access Key</label>
      <input id="accessKey" type="text" placeholder="access-key">
    </div>
    <div class="field">
      <label>Secret Key</label>
      <input id="secretKey" type="password" placeholder="secret-key">
    </div>
    <button class="btn-connect" id="btnConnect" onclick="connect()">
      <span>Połącz</span>
    </button>
    <div class="err-msg" id="loginErr" style="display:none"></div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp" style="display:none">
  <aside>
    <div class="section-label">Buckety</div>
    <div class="bucket-list" id="bucketList"></div>
  </aside>

  <main>
    <div class="toolbar">
      <div class="breadcrumb" id="breadcrumb"><span class="crumb last">wybierz bucket</span></div>
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Szukaj w buckecie..." oninput="onSearch(this.value)">
      </div>
      <button class="btn-icon" onclick="refresh()" title="Odśwież">↺</button>
    </div>

    <div class="sel-bar" id="selBar">
      <span>Zaznaczono:</span>
      <span class="sel-count" id="selCount">0</span>
      <span>plików</span>
      <div class="sp"></div>
      <button class="btn-sm btn-desel" onclick="deselAll()">✕ Odznacz</button>
      <button class="btn-sm btn-dl-all" onclick="dlSelected()">⬇ Pobierz zaznaczone</button>
    </div>

    <div class="file-area" id="fileArea">
      <div class="state"><div class="ico">🗄️</div><p>Zaloguj się i wybierz bucket.</p></div>
    </div>

    <div class="statusbar">
      <span id="sbText">—</span>
      <div class="sp"></div>
      <span id="sbSel"></span>
    </div>
  </main>
</div>

<script>
let creds = {};
let bucket = '';
let prefix = '';
let items = [];
let filtered = [];
let selected = new Set();
let searchQ = '';
let searchTimer = null;

async function api(path, body) {
  const r = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...creds, ...body })
  });
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d;
}

async function connect() {
  const btn = document.getElementById('btnConnect');
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:18px;height:18px;border-width:2px"></div>';

  creds = {
    endpoint: document.getElementById('endpoint').value.replace(/\/$/, ''),
    accessKey: document.getElementById('accessKey').value.trim(),
    secretKey: document.getElementById('secretKey').value.trim(),
  };

  try {
    const data = await api('/api/buckets', {});
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'flex';
    document.getElementById('btnLogout').style.display = '';
    setDot('ok', creds.endpoint.replace('https://', ''));
    renderBuckets(data.buckets);
  } catch (e) {
    err.textContent = e.message;
    err.style.display = '';
    setDot('err', 'błąd');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span>Połącz</span>';
  }
}

function logout() {
  creds = {}; bucket = ''; prefix = ''; items = []; filtered = []; selected.clear(); searchQ = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('btnLogout').style.display = 'none';
  document.getElementById('secretKey').value = '';
  setDot('', 'niepołączony');
}

function renderBuckets(names) {
  document.getElementById('bucketList').innerHTML = names.map(n =>
    `<div class="bucket-item" id="bi_${esc(n)}" onclick="openBucket('${esc(n)}')">
      <span>🪣</span><span class="bname">${esc(n)}</span>
    </div>`
  ).join('') || '<div style="color:var(--text3);font-size:12px;padding:10px">brak bucketów</div>';
}

async function openBucket(name) {
  bucket = name; prefix = ''; searchQ = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.bucket-item').forEach(e => e.classList.remove('active'));
  const bi = document.getElementById('bi_' + name);
  if (bi) bi.classList.add('active');
  await load();
}

async function openFolder(p) {
  prefix = p; searchQ = '';
  document.getElementById('searchInput').value = '';
  await load();
}

async function load() {
  if (!bucket) return;
  showLoading();
  selected.clear(); updateSelBar();
  try {
    const data = await api('/api/objects', { bucket, prefix, recursive: !!searchQ, search: searchQ });
    items = data.files;
    filtered = items;
    render();
    updateBreadcrumb();
    updateSb();
  } catch (e) {
    showErr(e.message);
  }
}

function onSearch(q) {
  searchQ = q.trim();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => load(), 400);
}

function render() {
  const area = document.getElementById('fileArea');
  if (!filtered.length) {
    area.innerHTML = `<div class="state"><div class="ico">🔍</div><p>Brak plików${searchQ ? ' dla "' + esc(searchQ) + '"' : ''}.</p></div>`;
    return;
  }

  const rows = filtered.map(item => {
    const isFolder = item.type === 'folder';
    const icon = isFolder ? '📁' : getIcon(item.name);
    const nameHtml = hl(esc(item.name), searchQ);
    if (isFolder) {
      return `<tr>
        <td class="td-chk"><input type="checkbox" disabled></td>
        <td><span class="fname folder" onclick="openFolder('${esc(item.key)}')">${icon} ${nameHtml}</span></td>
        <td class="fsize">—</td><td class="fdate">—</td><td class="td-act"></td>
      </tr>`;
    }
    const sel = selected.has(item.key);
    return `<tr class="${sel ? 'sel' : ''}" onclick="toggleRow(event,'${esc(item.key)}')">
      <td class="td-chk"><input type="checkbox" ${sel ? 'checked' : ''} onclick="toggleChk(event,'${esc(item.key)}')"></td>
      <td><span class="fname">${icon} ${nameHtml}</span></td>
      <td class="fsize">${fmtSize(item.size)}</td>
      <td class="fdate">${fmtDate(item.date)}</td>
      <td class="td-act"><button class="btn-dl1" onclick="dl1(event,'${esc(item.key)}')">↓</button></td>
    </tr>`;
  }).join('');

  area.innerHTML = `<table>
    <thead><tr>
      <th style="width:40px"><input type="checkbox" onclick="toggleAll(this)"></th>
      <th>Nazwa</th><th style="width:90px">Rozmiar</th>
      <th style="width:150px">Data</th><th style="width:50px"></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function toggleRow(e, key) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
  selected.has(key) ? selected.delete(key) : selected.add(key);
  updateSelBar(); render();
}

function toggleChk(e, key) {
  e.stopPropagation();
  selected.has(key) ? selected.delete(key) : selected.add(key);
  updateSelBar();
}

function toggleAll(cb) {
  if (cb.checked) filtered.filter(f => f.type === 'file').forEach(f => selected.add(f.key));
  else selected.clear();
  updateSelBar(); render();
}

function deselAll() { selected.clear(); updateSelBar(); render(); }

function updateSelBar() {
  const n = selected.size;
  document.getElementById('selBar').className = 'sel-bar' + (n > 0 ? ' on' : '');
  document.getElementById('selCount').textContent = n;
  document.getElementById('sbSel').textContent = n > 0 ? `${n} zaznaczonych` : '';
}

async function dl1(e, key) {
  e.stopPropagation();
  try {
    const { url } = await api('/api/download-url', { bucket, key });
    triggerDl(url, key.split('/').pop());
  } catch (err) { alert('Błąd: ' + err.message); }
}

async function dlSelected() {
  const keys = Array.from(selected);
  for (let i = 0; i < keys.length; i++) {
    try {
      const { url } = await api('/api/download-url', { bucket, key: keys[i] });
      triggerDl(url, keys[i].split('/').pop());
      if (i < keys.length - 1) await delay(350);
    } catch (err) { console.error(err); }
  }
}

function triggerDl(url, name) {
  const a = document.createElement('a');
  a.href = url; a.download = name; a.target = '_blank';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function refresh() { load(); }

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const parts = prefix ? prefix.split('/').filter(Boolean) : [];
  let html = `<span class="crumb" onclick="openFolder('')">${esc(bucket)}</span>`;
  let built = '';
  parts.forEach((p, i) => {
    built += p + '/';
    const cap = built;
    if (i === parts.length - 1) html += `<span class="crumb-sep">/</span><span class="crumb last">${esc(p)}</span>`;
    else html += `<span class="crumb-sep">/</span><span class="crumb" onclick="openFolder('${esc(cap)}')">${esc(p)}</span>`;
  });
  bc.innerHTML = html;
}

function updateSb() {
  const f = filtered.filter(x => x.type === 'file').length;
  const d = filtered.filter(x => x.type === 'folder').length;
  document.getElementById('sbText').textContent = `${f} plików, ${d} folderów${searchQ ? ' · filtr: "' + searchQ + '"' : ''}`;
}

function showLoading() {
  document.getElementById('fileArea').innerHTML = '<div class="state"><div class="spinner"></div><p>Ładowanie...</p></div>';
}

function showErr(msg) {
  document.getElementById('fileArea').innerHTML = `<div class="state"><div class="ico">⚠️</div><p class="emsg">${esc(msg)}</p></div>`;
}

function setDot(state, label) {
  document.getElementById('dot').className = 'dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
  document.getElementById('connLabel').textContent = label;
}

function getIcon(name) {
  const ext = (name.split('.').pop() || '').toLowerCase();
  const m = { pdf:'📄',xlsx:'📊',xls:'📊',csv:'📊',doc:'📝',docx:'📝',txt:'📝',
    zip:'🗜️',gz:'🗜️',tar:'🗜️','7z':'🗜️',rar:'🗜️',
    jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🖼️',svg:'🖼️',
    mp4:'🎬',mov:'🎬',mp3:'🎵',json:'⚙️',xml:'⚙️',yaml:'⚙️',yml:'⚙️',
    sh:'💻',py:'💻',js:'💻',ts:'💻',go:'💻',sql:'💻' };
  return m[ext] || '📋';
}

function fmtSize(b) {
  if (!b) return '0 B';
  const k = 1024, s = ['B','KB','MB','GB','TB'];
  const i = Math.floor(Math.log(b) / Math.log(k));
  return (b / Math.pow(k, i)).toFixed(1) + ' ' + s[i];
}

function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('pl-PL') + ' ' + dt.toLocaleTimeString('pl-PL', { hour:'2-digit', minute:'2-digit' });
}

function hl(text, q) {
  if (!q) return text;
  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i === -1) return text;
  return text.slice(0, i) + `<mark>${text.slice(i, i + q.length)}</mark>` + text.slice(i + q.length);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

document.getElementById('secretKey').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
</script>
